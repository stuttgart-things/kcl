---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ClaimTemplate
metadata:
  name: flux-kustomization-clusterbook-app
  title: Clusterbook App Deployment
  description: Deploys Clusterbook via Flux Kustomization with optional PowerDNS integration and NetworkConfig seed
  tags:
    - flux
    - app
    - clusterbook
spec:
  type: kustomization
  source: oci://ghcr.io/stuttgart-things/claim-flux-kustomizations
  tag: "0.3.10"
  parameters:
    - name: templateName
      title: Template
      type: string
      default: clusterbook
      hidden: true

    - name: name
      title: Kustomization Name
      type: string
      default: clusterbook
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: namespace
      title: Kustomization Namespace
      type: string
      default: flux-system
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: sourceRefName
      title: Source Reference Name
      type: string
      default: flux-apps

    - name: path
      title: Path
      type: string
      default: "./apps/clusterbook"

    - name: CLUSTERBOOK_NAMESPACE
      title: Clusterbook Namespace
      type: string
      default: clusterbook
      required: true
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: CLUSTERBOOK_VERSION
      title: Clusterbook Version
      type: string
      default: v1.20.2
      required: true

    - name: CLUSTERBOOK_HOSTNAME
      title: Hostname
      type: string
      default: clusterbook

    - name: GATEWAY_NAME
      title: Gateway Name
      type: string
      required: true
      description: Name of the gateway resource (e.g. my-cluster-gateway)

    - name: GATEWAY_NAMESPACE
      title: Gateway Namespace
      type: string
      default: default

    - name: DOMAIN
      title: Domain
      type: string
      required: true
      description: Ingress domain (e.g. my-cluster.sthings-vsphere.labul.sva.de)

    - name: PDNS_ENABLED
      title: PowerDNS Enabled
      type: string
      default: "false"
      enum:
        - "true"
        - "false"

    - name: PDNS_URL
      title: PowerDNS URL
      type: string
      default: ""
      description: Only required when PDNS_ENABLED is true

    - name: PDNS_ZONE
      title: PowerDNS Zone
      type: string
      default: ""
      description: Only required when PDNS_ENABLED is true

    - name: secretName
      title: Secret Name (PDNS)
      type: string
      default: clusterbook-pdns-vars
      description: Only used when PDNS_ENABLED is true
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: secretNamespace
      title: Secret Namespace
      type: string
      default: flux-system
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: networkConfigName
      title: NetworkConfig CR Name
      type: string
      default: ""
      description: Name for the NetworkConfig CR. Leave empty to skip NetworkConfig generation.
      pattern: "^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$"

    - name: networks
      title: Networks
      type: object
      default: {}
      description: >
        Network IP data for the NetworkConfig CR (only used when networkConfigName is set).
        Map of network prefixes to lists of IP entries, e.g.
        {"10.31.101": ["5:ASSIGNED:rancher-mgmt", "6", "7"], "10.31.103": ["3", "4:ASSIGNED:sandiego"]}

  secrets:
    - name: "{{.secretName}}"
      namespace: "{{.secretNamespace}}"
      optional: true
      description: Only required when PDNS_ENABLED is true
      parameters:
        - name: PDNS_TOKEN
          title: PowerDNS API Token
          type: string
          required: false
