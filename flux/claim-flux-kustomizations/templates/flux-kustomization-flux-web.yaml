---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ClaimTemplate
metadata:
  name: flux-kustomization-flux-web
  title: Flux Kustomization Flux Web UI
  description: Deploys a Flux Kustomization for Flux Web UI with gateway and domain substitutions
  tags:
    - flux
    - kustomization
    - flux-web
    - app
spec:
  type: kustomization
  source: oci://ghcr.io/stuttgart-things/claim-flux-kustomizations
  tag: 0.3.28
  parameters:
    - name: templateName
      title: Template
      type: string
      default: flux-web
    - name: name
      title: Resource Name
      type: string
      default: flux-web
    - name: namespace
      title: Namespace
      type: string
      default: flux-system
    - name: sourceRefName
      title: Source Reference Name
      type: string
      default: flux-apps
    - name: path
      title: Path
      type: string
      default: "./apps/flux-web"
    - name: interval
      title: Reconciliation Interval
      type: string
      default: "1h"
    - name: retryInterval
      title: Retry Interval
      type: string
      default: "1m"
    - name: timeout
      title: Timeout
      type: string
      default: "5m"
    - name: prune
      title: Enable Pruning
      type: boolean
      default: true
    - name: dependsOnNames
      title: Dependency Names
      type: string
      description: "Comma-separated list of Kustomization names this depends on"
    - name: fluxWebNamespace
      title: Flux Web Namespace
      type: string
      default: flux-system
      description: "Namespace for Flux Web (FLUX_WEB_NAMESPACE)"
    - name: fluxWebVersion
      title: Flux Web Version
      type: string
      default: "0.43.0"
      description: "Flux Web Helm chart version (FLUX_WEB_VERSION)"
    - name: fluxWebGatewayName
      title: Gateway Name
      type: string
      default: gateway
      description: "Name of the Gateway resource (GATEWAY_NAME)"
    - name: fluxWebGatewayNamespace
      title: Gateway Namespace
      type: string
      default: default
      description: "Namespace of the Gateway resource (GATEWAY_NAMESPACE)"
    - name: fluxWebHostname
      title: Hostname
      type: string
      default: flux
      description: "Hostname for Flux Web (HOSTNAME)"
    - name: fluxWebDomain
      title: Domain
      type: string
      description: "Domain for Flux Web (DOMAIN)"
