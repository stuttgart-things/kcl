---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ClaimTemplate
metadata:
  name: flux-kustomization-crossplane-configs
  title: Flux Kustomization Crossplane Configs
  description: Deploys Crossplane Configurations (cloud-config, volume-claim, storage-platform, ansible-run, pipeline-integration, harvester-vm) via Flux
  tags:
    - flux
    - kustomization
    - crossplane
    - configs
    - infrastructure
spec:
  type: kustomization
  source: oci://ghcr.io/stuttgart-things/claim-flux-kustomizations
  tag: 0.3.32
  parameters:
    - name: templateName
      title: Template
      type: string
      default: crossplane-configs

    - name: name
      title: Resource Name
      type: string
      default: crossplane-configs
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: namespace
      title: Namespace
      type: string
      default: flux-system
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: sourceRefKind
      title: Source Reference Kind
      type: string
      default: GitRepository
      enum:
        - GitRepository
        - OCIRepository
        - Bucket

    - name: sourceRefName
      title: Source Reference Name
      type: string
      default: flux-apps
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: sourceRefNamespace
      title: Source Reference Namespace
      type: string
      description: "Namespace of the source, defaults to Kustomization namespace"

    - name: path
      title: Path
      type: string
      default: "./cicd/crossplane/components/configs"
      description: "Path to the directory containing the kustomization.yaml"

    - name: interval
      title: Reconciliation Interval
      type: string
      default: "1h"

    - name: retryInterval
      title: Retry Interval
      type: string
      default: "1m"

    - name: timeout
      title: Timeout
      type: string
      default: "5m"

    - name: prune
      title: Enable Pruning
      type: boolean
      default: true

    - name: force
      title: Force Recreation
      type: boolean
      default: false

    - name: suspend
      title: Suspend Reconciliation
      type: boolean
      default: false

    - name: dependsOnNames
      title: Dependency Names
      type: string
      default: "crossplane-install,crossplane-functions"
      description: "Comma-separated list of Kustomization names this depends on"

    - name: dependsOnNamespace
      title: Dependencies Namespace
      type: string
      description: "Namespace of dependencies, defaults to Kustomization namespace"

    - name: crossplaneConfigCloudConfigVersion
      title: Cloud Config Version
      type: string
      default: "v0.5.1"
      description: "Version of cloud-config Configuration (CROSSPLANE_CONFIG_CLOUD_CONFIG_VERSION)"

    - name: crossplaneConfigVolumeClaimVersion
      title: Volume Claim Version
      type: string
      default: "v0.1.1"
      description: "Version of volume-claim Configuration (CROSSPLANE_CONFIG_VOLUME_CLAIM_VERSION)"

    - name: crossplaneConfigStoragePlatformVersion
      title: Storage Platform Version
      type: string
      default: "v0.6.0"
      description: "Version of storage-platform Configuration (CROSSPLANE_CONFIG_STORAGE_PLATFORM_VERSION)"

    - name: crossplaneConfigAnsibleRunVersion
      title: Ansible Run Version
      type: string
      default: "v12.0.0"
      description: "Version of ansible-run Configuration (CROSSPLANE_CONFIG_ANSIBLE_RUN_VERSION)"

    - name: crossplaneConfigPipelineIntegrationVersion
      title: Pipeline Integration Version
      type: string
      default: "v0.1.2"
      description: "Version of pipeline-integration Configuration (CROSSPLANE_CONFIG_PIPELINE_INTEGRATION_VERSION)"

    - name: crossplaneConfigHarvesterVmVersion
      title: Harvester VM Version
      type: string
      default: "v0.3.3"
      description: "Version of harvester-vm Configuration (CROSSPLANE_CONFIG_HARVESTER_VM_VERSION)"

    - name: kubeConfigSecretRef
      title: KubeConfig Secret
      type: string
      description: "Secret containing kubeconfig for remote cluster deployment"

    - name: kubeConfigSecretKey
      title: KubeConfig Secret Key
      type: string
      default: "value"
      description: "Key in the kubeconfig secret"

    - name: serviceAccountName
      title: Service Account
      type: string
      description: "Service account to impersonate during reconciliation"
