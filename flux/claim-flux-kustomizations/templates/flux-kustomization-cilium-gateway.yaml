---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ClaimTemplate
metadata:
  name: flux-kustomization-cilium-gateway
  title: Flux Kustomization Cilium Gateway
  description: Deploys a Flux Kustomization for Cilium Gateway with post-build substitutions
  tags:
    - flux
    - kustomization
    - cilium
    - gateway
    - infrastructure
spec:
  type: kustomization
  source: oci://ghcr.io/stuttgart-things/claim-flux-kustomizations
  tag: 0.3.22
  parameters:
    - name: templateName
      title: Template
      type: string
      default: cilium-gateway

    - name: name
      title: Resource Name
      type: string
      default: cilium-gateway
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: namespace
      title: Namespace
      type: string
      default: flux-system
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: sourceRefKind
      title: Source Reference Kind
      type: string
      default: GitRepository
      enum:
        - GitRepository
        - OCIRepository
        - Bucket

    - name: sourceRefName
      title: Source Reference Name
      type: string
      default: flux-infra
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: sourceRefNamespace
      title: Source Reference Namespace
      type: string
      description: "Namespace of the source, defaults to Kustomization namespace"

    - name: path
      title: Path
      type: string
      default: "./infra/cilium/components/gateway"
      description: "Path to the directory containing the kustomization.yaml"

    - name: interval
      title: Reconciliation Interval
      type: string
      default: "1h"
      description: "Interval at which to reconcile (e.g., 5m, 1h)"

    - name: retryInterval
      title: Retry Interval
      type: string
      default: "1m"
      description: "Interval at which to retry failed reconciliations"

    - name: timeout
      title: Timeout
      type: string
      default: "5m"
      description: "Timeout for apply and health checking"

    - name: prune
      title: Enable Pruning
      type: boolean
      default: true
      description: "Enable garbage collection of resources"

    - name: force
      title: Force Recreation
      type: boolean
      default: false
      description: "Recreate resources when patching fails"

    - name: suspend
      title: Suspend Reconciliation
      type: boolean
      default: false

    - name: dependsOnNames
      title: Dependency Names
      type: string
      default: "cilium-lb,cert-manager-selfsigned"
      description: "Comma-separated list of Kustomization names this depends on"

    - name: dependsOnNamespace
      title: Dependencies Namespace
      type: string
      description: "Namespace of dependencies, defaults to Kustomization namespace"

    - name: ciliumGatewayName
      title: Gateway Name
      type: string
      default: gateway
      description: "Name of the Cilium Gateway resource (CILIUM_GATEWAY_NAME)"

    - name: ciliumGatewayNamespace
      title: Gateway Namespace
      type: string
      default: default
      description: "Namespace for the Gateway resource (CILIUM_GATEWAY_NAMESPACE)"

    - name: ciliumGatewayDomain
      title: Gateway Domain
      type: string
      description: "Domain for the Gateway (CILIUM_GATEWAY_DOMAIN)"

    - name: ciliumGatewayTlsSecret
      title: TLS Secret Name
      type: string
      description: "TLS secret for the Gateway (CILIUM_GATEWAY_TLS_SECRET)"

    - name: decryptionProvider
      title: Decryption Provider
      type: string
      enum:
        - sops
      description: "Enable SOPS decryption"

    - name: decryptionSecretRef
      title: Decryption Secret
      type: string
      description: "Secret containing decryption keys"

    - name: kubeConfigSecretRef
      title: KubeConfig Secret
      type: string
      description: "Secret containing kubeconfig for remote cluster deployment"

    - name: kubeConfigSecretKey
      title: KubeConfig Secret Key
      type: string
      default: "value"
      description: "Key in the kubeconfig secret"

    - name: serviceAccountName
      title: Service Account
      type: string
      description: "Service account to impersonate during reconciliation"
