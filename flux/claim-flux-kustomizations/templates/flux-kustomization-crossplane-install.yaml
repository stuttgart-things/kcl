---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ClaimTemplate
metadata:
  name: flux-kustomization-crossplane-install
  title: Flux Kustomization Crossplane Install
  description: Deploys Crossplane core with Helm, K8s, and OpenTofu providers via Flux
  tags:
    - flux
    - kustomization
    - crossplane
    - infrastructure
spec:
  type: kustomization
  source: oci://ghcr.io/stuttgart-things/claim-flux-kustomizations
  tag: 0.3.32
  parameters:
    - name: templateName
      title: Template
      type: string
      default: crossplane-install

    - name: name
      title: Resource Name
      type: string
      default: crossplane-install
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: namespace
      title: Namespace
      type: string
      default: flux-system
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: sourceRefKind
      title: Source Reference Kind
      type: string
      default: GitRepository
      enum:
        - GitRepository
        - OCIRepository
        - Bucket

    - name: sourceRefName
      title: Source Reference Name
      type: string
      default: flux-apps
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: sourceRefNamespace
      title: Source Reference Namespace
      type: string
      description: "Namespace of the source, defaults to Kustomization namespace"

    - name: path
      title: Path
      type: string
      default: "./cicd/crossplane/components/install"
      description: "Path to the directory containing the kustomization.yaml"

    - name: interval
      title: Reconciliation Interval
      type: string
      default: "1h"

    - name: retryInterval
      title: Retry Interval
      type: string
      default: "1m"

    - name: timeout
      title: Timeout
      type: string
      default: "5m"

    - name: prune
      title: Enable Pruning
      type: boolean
      default: true

    - name: force
      title: Force Recreation
      type: boolean
      default: false

    - name: suspend
      title: Suspend Reconciliation
      type: boolean
      default: false

    - name: dependsOnNames
      title: Dependency Names
      type: string
      description: "Comma-separated list of Kustomization names this depends on"

    - name: dependsOnNamespace
      title: Dependencies Namespace
      type: string
      description: "Namespace of dependencies, defaults to Kustomization namespace"

    - name: crossplaneNamespace
      title: Crossplane Namespace
      type: string
      default: crossplane-system
      description: "Namespace where Crossplane will be installed (CROSSPLANE_NAMESPACE)"

    - name: crossplaneVersion
      title: Crossplane Version
      type: string
      default: "2.2.0"
      description: "Crossplane Helm chart version (CROSSPLANE_VERSION)"

    - name: helmProviderVersion
      title: Helm Provider Version
      type: string
      default: "v1.2.0"
      description: "Crossplane Helm provider version (CROSSPLANE_HELM_PROVIDER_VERSION)"

    - name: k8sProviderVersion
      title: K8s Provider Version
      type: string
      default: "v1.2.1"
      description: "Crossplane K8s provider version (CROSSPLANE_K8S_PROVIDER_VERSION)"

    - name: kubeConfigSecretRef
      title: KubeConfig Secret
      type: string
      description: "Secret containing kubeconfig for remote cluster deployment"

    - name: kubeConfigSecretKey
      title: KubeConfig Secret Key
      type: string
      default: "value"
      description: "Key in the kubeconfig secret"

    - name: serviceAccountName
      title: Service Account
      type: string
      description: "Service account to impersonate during reconciliation"
