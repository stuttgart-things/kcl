---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ClaimTemplate
metadata:
  name: clusterbook-cluster-developer
  title: Clusterbook Cluster (Developer)
  description: Register a cluster with clusterbook-operator — just a name and a network pool. DNS, kubeconfig secret and IP-release behaviour are inherited from sensible defaults.
  tags:
    - clusterbook
    - cluster
    - argocd
    - kubernetes
    - developer
spec:
  type: clusterbookcluster
  source: oci://ghcr.io/stuttgart-things/clusterbook-cluster-gen
  tag: 0.4.0
  parameters:
    # ---- the essentials a developer picks ----
    - name: name
      title: Cluster Name
      type: string
      required: true
      default: dev-cluster
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
      description: "metadata.name and (by default) the clusterbook/ArgoCD cluster name"

    - name: networkKey
      title: Network Pool
      type: string
      required: true
      default: "10.31.101"
      description: "clusterbook network pool that supplies the cluster VIP, e.g. 10.31.103"

    # ---- everything else uses sensible defaults / is hidden ----
    - name: providerConfigName
      title: Provider Config
      type: string
      default: default
      description: "name for the auto-built providerConfigRef"
      hidden: true

    - name: argocdNamespace
      title: ArgoCD Namespace
      type: string
      default: argocd
      description: "namespace where the ArgoCD cluster Secret is written"
      hidden: true

    - name: createDNS
      title: Create DNS Record
      type: boolean
      default: true
      description: "ask clusterbook to create a wildcard DNS record"
      hidden: true

    - name: preserveKubeconfigServer
      title: Preserve Kubeconfig Server URL
      type: boolean
      default: true
      description: "keep data.server set to the kubeconfig's URL"
      hidden: true

    - name: releaseOnDelete
      title: Release IP On Delete
      type: boolean
      default: true
      description: "release the clusterbook IP reservation when the CR is deleted"
      hidden: true
