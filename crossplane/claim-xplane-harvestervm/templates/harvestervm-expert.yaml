---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ClaimTemplate
metadata:
  name: harvestervm-expert
  title: Crossplane Harvester VM (Expert)
  description: Full control over a Harvester VM, including the env-sourced infrastructure overrides and optional Ansible provisioning.
  tags:
    - harvester
    - vm
    - crossplane
    - kubevirt
    - expert
spec:
  type: harvestervm
  source: oci://ghcr.io/stuttgart-things/claim-xplane-harvestervm
  tag: 0.2.0
  parameters:
    # ---- identity ----
    - name: name
      title: VM Name
      type: string
      required: true
      default: dev-vm
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
      description: "Name of the VM and XR"

    - name: namespace
      title: XR Namespace
      type: string
      default: default
      description: "Namespace the HarvesterVM XR object lives in"

    - name: environmentConfig
      title: Environment
      type: string
      default: default
      description: "EnvironmentConfig selector for shared infrastructure defaults"

    - name: vmName
      title: VM Name (cloud-init)
      type: string
      required: false
      description: "Overrides the cloud-init VM name (defaults to <name>)"

    - name: hostname
      title: Hostname
      type: string
      required: false
      description: "VM hostname (defaults to <name>)"

    # ---- sizing: a size, or explicit cpu/memory/storage overrides ----
    - name: size
      title: T-Shirt Size
      type: string
      default: M
      enum:
        - S
        - M
        - L
        - XL
        - XXL
      description: "Baseline sizing; the explicit cores/memory/cpuResource/storage below override it when set"

    - name: cores
      title: CPU Cores
      type: integer
      required: false
      description: "Override CPU cores (otherwise from size)"

    - name: memory
      title: Memory
      type: string
      required: false
      description: "Override memory, e.g. 8Gi (otherwise from size)"

    - name: cpuResource
      title: CPU Resource
      type: string
      required: false
      description: "Override CPU resource string, e.g. \"8\" (otherwise from size)"

    - name: storage
      title: Root Disk Size
      type: string
      required: false
      description: "Override root disk size, e.g. 80Gi (otherwise from size)"

    # ---- image / volume ----
    - name: image
      title: VM Image
      type: string
      default: inherit
      enum:
        - inherit
        - ubuntu25
        - ubuntu22
        - rocky9
        - rocky8
        - debian12
        - opensuse15
        - opensuse-micro
      description: "Base image alias. 'inherit' uses the environment's default image."

    - name: imageId
      title: Image ID (Override)
      type: string
      required: false
      description: "Direct Harvester image id in namespace/image-xxx form (wins over the alias and the environment)"

    - name: pvcName
      title: PVC Name
      type: string
      required: false
      description: "Root disk PVC name (defaults to <name>-disk-0)"

    - name: accessModes
      title: Access Modes
      type: array
      items:
        type: string
      default:
        - ReadWriteOnce
      description: "PVC access modes. Keep ReadWriteOnce for a single-VM boot disk (RWX Block boot volume risks corruption)."

    - name: volumeMode
      title: Volume Mode
      type: string
      default: Block
      enum:
        - Block
        - Filesystem
      description: "PVC volume mode"

    # ---- env-sourced infrastructure overrides (blank = inherit) ----
    - name: providerConfigRef
      title: Provider Config (Override)
      type: string
      required: false
      description: "ClusterProviderConfig name; blank inherits from the environment"

    - name: storageClassName
      title: Storage Class (Override)
      type: string
      required: false
      description: "Storage class; blank inherits from the environment"

    - name: targetNamespace
      title: Target Namespace (Override)
      type: string
      required: false
      description: "Namespace for the PVC, cloud-init Secret and VM; blank inherits from the environment"

    - name: networkName
      title: Network Name (Override)
      type: string
      required: false
      description: "Multus network in namespace/name form; blank inherits from the environment"

    # ---- cloud-init ----
    - name: user
      title: Login User
      type: string
      default: sthings
      description: "Primary cloud-init user"

    - name: sshKey
      title: SSH Public Key
      type: string
      required: false
      description: "SSH public key for the login user"

    - name: packages
      title: Extra Packages
      type: array
      items:
        type: string
      default: []
      description: "Additional packages (qemu-guest-agent always included)"

    - name: domain
      title: Domain
      type: string
      default: local
      description: "Cloud-init domain"

    - name: timezone
      title: Timezone
      type: string
      default: Europe/Berlin
      description: "Timezone"

    - name: hardened
      title: Hardened OS
      type: boolean
      default: false
      description: "Tighten cloud-init posture; the explicit booleans below override it"

    - name: packageUpgrade
      title: Package Upgrade
      type: boolean
      required: false
      description: "Upgrade packages on boot (otherwise from hardened)"

    - name: sshPasswordAuth
      title: SSH Password Auth
      type: boolean
      required: false
      description: "Allow SSH password authentication (otherwise from hardened)"

    - name: disableRoot
      title: Disable Root
      type: boolean
      required: false
      description: "Disable root login (otherwise from hardened)"

    # ---- vm ----
    - name: os
      title: Operating System
      type: string
      default: ubuntu
      description: "OS type label for the VM"

    - name: machineType
      title: Machine Type
      type: string
      default: q35
      description: "KubeVirt machine type"

    - name: runStrategy
      title: Run Strategy
      type: string
      default: RerunOnFailure
      enum:
        - Always
        - RerunOnFailure
        - Manual
        - Halted
      description: "VM run strategy"

    - name: evictionStrategy
      title: Eviction Strategy
      type: string
      default: LiveMigrateIfPossible
      enum:
        - LiveMigrateIfPossible
        - LiveMigrate
        - None
      description: "VM eviction strategy"

    # ---- optional Ansible provisioning ----
    - name: ansibleEnabled
      title: Ansible Provisioning
      type: boolean
      default: false
      description: "Emit an AnsibleRun after the VM is up (requires the ansible-run Configuration on the cluster)"
