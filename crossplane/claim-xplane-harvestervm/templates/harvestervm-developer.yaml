---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ClaimTemplate
metadata:
  name: harvestervm-developer
  title: Crossplane Harvester VM (Developer)
  description: Create a Harvester VM with minimal input — just a name and a size. Infrastructure is inherited from the environment.
  tags:
    - harvester
    - vm
    - crossplane
    - kubevirt
    - developer
spec:
  type: harvestervm
  source: oci://ghcr.io/stuttgart-things/claim-xplane-harvestervm
  tag: 0.2.0
  parameters:
    # ---- the essentials a developer picks ----
    - name: name
      title: VM Name
      type: string
      required: true
      default: dev-vm
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
      description: "Name of the VM"

    - name: size
      title: T-Shirt Size
      type: string
      default: M
      enum:
        - S
        - M
        - L
        - XL
        - XXL
      description: "VM size — S (2CPU/2Gi/20Gi), M (4CPU/4Gi/40Gi), L (8CPU/8Gi/80Gi), XL (16CPU/16Gi/160Gi), XXL (32CPU/32Gi/320Gi)"

    - name: image
      title: VM Image
      type: string
      default: inherit
      enum:
        - inherit
        - ubuntu25
        - ubuntu22
        - rocky9
        - rocky8
        - debian12
        - opensuse15
        - opensuse-micro
      description: "Base image. 'inherit' uses the environment's default image (recommended)."

    # ---- everything else is inherited from the environment / hidden ----
    - name: environmentConfig
      title: Environment
      type: string
      default: default
      description: "EnvironmentConfig selector that supplies provider, storage class, namespace, network and base image"
      hidden: true

    - name: hardened
      title: Hardened OS
      type: boolean
      default: false
      description: "Tighten cloud-init posture (package upgrade on boot, disable root, no SSH password auth)"
      hidden: true
