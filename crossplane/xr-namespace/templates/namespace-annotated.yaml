---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ClaimTemplate
metadata:
  name: xr-namespace-annotated
  title: Crossplane Managed Namespace (annotated)
  description: Creates/adopts a Namespace on a target cluster with a user-defined set of annotations.
  tags:
    - namespace
    - crossplane
spec:
  type: xr-namespace
  source: oci://ghcr.io/stuttgart-things/xr-namespace
  tag: 0.1.1
  parameters:
    # Template selector
    - name: templateName
      title: Template
      type: string
      default: annotated
      hidden: true

    - name: name
      title: Namespace Name
      type: string
      required: true
      default: demo-ns
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: claimNamespace
      title: Claim Namespace
      type: string
      required: true
      default: default
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

    - name: providerConfig
      title: Target cluster
      type: string
      default: harvester
      description: >
        Name of the Kubernetes (Cluster)ProviderConfig to target. Common values:
        in-cluster, harvester. Free text - enter any ProviderConfig that exists
        on crossplane-mgmt (useful when the profile targets a recently created
        cluster not in the default list).

    - name: annotations
      title: Namespace Annotations
      type: string
      default: ""
      description: >
        Annotations applied to the Namespace as a comma-separated list of
        key=value pairs (the API cannot round-trip object params to KCL, so a
        string is used). Example for the Harvester "Default" Rancher project so
        the UI lists the VMs: field.cattle.io/projectId=c-cxgxd:p-sfgv4
        Multiple: field.cattle.io/projectId=c-cxgxd:p-sfgv4,owner=team-x
