---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ClaimTemplate
metadata:
  name: xr-virtualmachine-harvester
  title: Crossplane Virtual Machine (Harvester)
  description: Create a Harvester / KubeVirt VM. provider and environment are fixed to harvester; placement, images and credentials come from the virtualmachine-harvester EnvironmentConfig.
  tags:
    - vm
    - harvester
    - kubevirt
    - crossplane
spec:
  type: xr-virtualmachine
  source: oci://ghcr.io/stuttgart-things/xr-virtualmachine
  tag: 0.1.0
  parameters:
    # Template selector
    - name: templateName
      title: Template
      type: string
      default: harvester
      hidden: true

    # provider + environment are fixed for this Harvester preset.
    - name: provider
      title: Provider
      type: string
      default: harvester
      hidden: true

    - name: environment
      title: Environment
      type: string
      default: harvester
      hidden: true

    - name: name
      title: VM Name
      type: string
      required: true
      default: vm-harvester-1
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
      description: "Name of the XVirtualMachine claim / VM"

    - name: claimNamespace
      title: Claim Namespace
      type: string
      required: true
      default: default
      pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
      description: "Namespace of the XR on the management cluster (the VM lands in the env config's namespace on Harvester)"

    - name: size
      title: T-Shirt Size
      type: string
      default: medium
      enum:
        - small
        - medium
        - large
        - xlarge
      description: "Maps to cpu/ram/disk (small -> 2CPU/2Gi/32Gi)"

    - name: os
      title: OS / Image
      type: string
      default: ubuntu24
      enum:
        - ubuntu24
        - sthings-u26
        - sthings-u26-k3s
        - rocky9-dev
        - sthings-rocky9
        - sthings-leap
      description: "Keys the harvester images map in the EnvironmentConfig -> {imageId, storageClassName}. ubuntu24 is the default alias for default/u26-dev."

    - name: ansible
      title: Run Ansible
      type: boolean
      default: false
      description: "Run base-OS Ansible provisioning once the VM reports an IP (requires virtual-machine >=v0.1.6)"
